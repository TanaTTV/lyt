<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lyt — lightweight YouTube downloader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Title bar / header -->
      <header class="topbar">
        <div class="brand">
          <svg class="feather" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" />
            <line x1="16" y1="8" x2="2" y2="22" />
            <line x1="17.5" y1="15" x2="9" y2="15" />
          </svg>
          <div class="brand-text">
            <span class="brand-name">lyt</span>
            <span class="brand-sub">lightweight youtube downloader</span>
          </div>
        </div>

        <div class="topbar-right">
          <button class="chip" id="folderChip" title="Change download folder">
            <svg viewBox="0 0 24 24" class="ico" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span id="folderLabel">~/Downloads</span>
          </button>
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg viewBox="0 0 24 24" class="ico" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3.6 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 3.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 16 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 21 9.4z"/></svg>
          </button>
        </div>
      </header>

      <!-- Search / paste bar -->
      <section class="searchbar">
        <div class="search-input">
          <svg viewBox="0 0 24 24" class="ico search-ico" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="query" type="text" placeholder="Paste a YouTube link, or search…" autocomplete="off" />
          <button class="search-go" id="searchBtn">Search</button>
        </div>

        <div class="controls">
          <div class="segmented" role="tablist" aria-label="Download type">
            <button class="seg active" data-kind="audio" role="tab">
              <svg viewBox="0 0 24 24" class="ico" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              Audio
            </button>
            <button class="seg" data-kind="video" role="tab">
              <svg viewBox="0 0 24 24" class="ico" aria-hidden="true"><rect x="2" y="5" width="14" height="14" rx="2"/><path d="M22 7l-6 5 6 5z"/></svg>
              Video
            </button>
          </div>

          <label class="field">
            <span class="field-label" id="qualityLabel">Format</span>
            <select id="quality"></select>
          </label>
        </div>
      </section>

      <!-- Main split: results + downloads -->
      <main class="content">
        <section class="results" id="results" aria-label="Results">
          <!-- result cards injected here -->
        </section>

        <aside class="downloads" aria-label="Downloads">
          <div class="downloads-head">
            <h2>Downloads</h2>
            <button class="link-btn" id="clearDone">Clear finished</button>
          </div>
          <div class="downloads-list" id="downloadsList">
            <div class="empty" id="downloadsEmpty">
              <svg viewBox="0 0 24 24" class="empty-ico" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <p>Your downloads will show up here.</p>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
