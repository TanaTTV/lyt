name: Publish to npm

# Publishes the package when you create a GitHub Release.
# Requires an NPM_TOKEN secret (Settings -> Secrets -> Actions) with an
# automation token from your npm account that can publish lyt.

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run for CLI releases (v*), not desktop releases (app-v*)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Verify release tag matches package version
        run: test "v$(node -p \"require('./package.json').version\")" = "$GITHUB_REF_NAME"
      - run: npm run check
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
