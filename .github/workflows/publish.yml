name: Publish to npm

# Publishes the package when you create a GitHub Release.
# Requires an NPM_TOKEN secret (Settings -> Secrets -> Actions) with an
# automation token from your npm account that can publish lyt.

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run for CLI releases (v*), not desktop releases (app-v*)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
