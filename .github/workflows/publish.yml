name: Publish to npm

# Publishes the package when you create a GitHub Release.
# Authentication uses npm Trusted Publishing (OIDC) for this repository and
# workflow, so no long-lived npm token is stored in GitHub.

on:
  release:
    types: [published]

jobs:
  publish:
    # Only run for CLI releases (v*), not desktop releases (app-v*)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install a Trusted Publishing compatible npm CLI
        run: npm install --global npm@latest
      - name: Verify release tag matches package version
        run: node -e "const version = require('./package.json').version; if (process.env.GITHUB_REF_NAME !== 'v' + version) throw new Error('Release tag does not match package version')"
      - run: npm run check
      - run: npm publish --access public
