name: Deploy product website

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Read release metadata
        id: metadata
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
      - name: Build and verify website
        working-directory: website
        env:
          SITE_URL: https://tanattv.github.io/lyt
        run: npm run check
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify the public homepage reports this release
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --location "$PAGE_URL" | grep --fixed-strings "lyt $EXPECTED_VERSION"; then
              exit 0
            fi
            echo "Pages has not exposed lyt $EXPECTED_VERSION yet (attempt $attempt/6)."
            sleep 10
          done
          echo "The public site did not report lyt $EXPECTED_VERSION after deployment." >&2
          exit 1
