name: Desktop release

# Builds the Tauri desktop app for Windows, macOS, and Linux and attaches
# the installers to the GitHub Release that triggered this workflow.
#
# Triggered by any release whose tag starts with "app-v" (e.g. app-v0.1.0),
# keeping desktop releases separate from CLI (npm) releases.

on:
  release:
    types: [published]

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/app-v')
    permissions:
      contents: write  # needed to upload release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            webkit2gtk-4.1 \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tauriScript: npx @tauri-apps/cli
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: lyt desktop ${{ github.ref_name }}
          releaseBody: |
            Desktop app build for ${{ matrix.target }}.
            See the [release notes](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
