name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Test CLI
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Verify npm package
        shell: bash
        run: |
          set -o pipefail
          npm run check:pack 2>&1 | tee package.log

      - name: Build and verify website
        shell: bash
        run: |
          set -o pipefail
          npm run check:website 2>&1 | tee website.log

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ matrix.os }}-node-${{ matrix.node }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7
