name: Feature request
description: Propose a focused user or agent workflow improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed outcome
      description: Describe the result you want, not only a flag name.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Primary user
      options:
        - Person using the CLI
        - Script or automation
        - Codex or Claude agent
        - Maintainer or packager
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
